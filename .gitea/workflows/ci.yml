name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  detect_changes:
    runs-on: ubuntu-latest
    outputs:
      has_test_crates: ${{ steps.detect.outputs.has_test_crates }}
      has_publish_crates: ${{ steps.detect.outputs.has_publish_crates }}
      test_matrix: ${{ steps.detect.outputs.test_matrix }}
      publish_matrix: ${{ steps.detect.outputs.publish_matrix }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Build crate matrix
        id: detect
        run: |
          node scripts/ci/publish.mjs plan \
            --event-name "${{ github.event_name }}" \
            --head-sha "${{ github.sha }}" \
            --base-sha "${{ github.event.pull_request.base.sha }}" \
            --before-sha "${{ github.event.before }}" \
            --github-output "$GITHUB_OUTPUT"

  test:
    needs: detect_changes
    if: ${{ needs.detect_changes.outputs.has_test_crates == 'true' }}
    runs-on: ubuntu-latest
    strategy:
      matrix: ${{ fromJson(needs.detect_changes.outputs.test_matrix) }}
    name: test (${{ matrix.crate }})
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Run crate tests
        run: cargo test --manifest-path ${{ matrix.crate }}/Cargo.toml

      - name: Check examples
        run: cargo check --manifest-path ${{ matrix.crate }}/Cargo.toml --examples

  publish:
    needs: [detect_changes, test]
    if: ${{ (github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')) && needs.detect_changes.outputs.has_publish_crates == 'true' }}
    runs-on: ubuntu-latest
    strategy:
      matrix: ${{ fromJson(needs.detect_changes.outputs.publish_matrix) }}
    name: publish (${{ matrix.crate }})
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Publish crate to Kellnr
        env:
          KELLNR_TOKEN: ${{ secrets.KELLNR_TOKEN }}
        run: |
          if [ -z "$KELLNR_TOKEN" ]; then
            echo "Missing secret: KELLNR_TOKEN"
            exit 1
          fi
          cargo publish --manifest-path ${{ matrix.crate }}/Cargo.toml --registry kellnr --token "$KELLNR_TOKEN"
