name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  detect_changes:
    runs-on: rust
    outputs:
      has_test_crates: ${{ steps.detect.outputs.has_test_crates }}
      has_publish_crates: ${{ steps.detect.outputs.has_publish_crates }}
      test_crates: ${{ steps.detect.outputs.test_crates }}
      publish_crates: ${{ steps.detect.outputs.publish_crates }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Build crate matrix
        id: detect
        run: |
          node scripts/ci/publish.mjs plan \
            --event-name "${{ github.event_name }}" \
            --head-sha "${{ github.sha }}" \
            --base-sha "${{ github.event.pull_request.base.sha }}" \
            --before-sha "${{ github.event.before }}" \
            --github-output "$GITHUB_OUTPUT"

      - name: Preview publish registry status
        continue-on-error: true
        env:
          KELLNR_TOKEN: ${{ secrets.KELLNR_TOKEN }}
          CRATESIO_TOKEN: ${{ secrets.CRATESIO_TOKEN }}
        run: |
          node scripts/ci/publish.mjs inspect-publish \
            --crates-json '${{ steps.detect.outputs.publish_crates }}' \
            --kellnr-token "$KELLNR_TOKEN" \
            --crates-io-token "$CRATESIO_TOKEN"

  test:
    needs: detect_changes
    if: ${{ needs.detect_changes.outputs.has_test_crates == 'true' }}
    runs-on: rust
    name: test
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Install system deps
        run: |
          if [ -f /etc/apt/sources.list.d/ubuntu.sources ]; then
            sudo sed -i 's|http://archive.ubuntu.com/ubuntu|https://apt.cloud1ful.com/ubuntu|g; s|http://security.ubuntu.com/ubuntu|https://apt.cloud1ful.com/ubuntu|g; s|https://archive.ubuntu.com/ubuntu|https://apt.cloud1ful.com/ubuntu|g; s|https://security.ubuntu.com/ubuntu|https://apt.cloud1ful.com/ubuntu|g' /etc/apt/sources.list.d/ubuntu.sources
          fi
          if [ -f /etc/apt/sources.list ]; then
            sudo sed -i 's|http://archive.ubuntu.com/ubuntu|https://apt.cloud1ful.com/ubuntu|g; s|http://security.ubuntu.com/ubuntu|https://apt.cloud1ful.com/ubuntu|g; s|https://archive.ubuntu.com/ubuntu|https://apt.cloud1ful.com/ubuntu|g; s|https://security.ubuntu.com/ubuntu|https://apt.cloud1ful.com/ubuntu|g' /etc/apt/sources.list
          fi
          sudo apt-get update
          sudo apt-get install -y pkg-config libudev-dev

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Run changed crate tests
        run: |
          node scripts/ci/publish.mjs test \
            --crates-json '${{ needs.detect_changes.outputs.test_crates }}'

  publish:
    needs: [detect_changes, test]
    if: ${{ always() && (github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')) && needs.detect_changes.outputs.has_publish_crates == 'true' && (needs.test.result == 'success' || needs.test.result == 'skipped') }}
    runs-on: rust
    name: publish
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Install system deps
        run: |
          if [ -f /etc/apt/sources.list.d/ubuntu.sources ]; then
            sudo sed -i 's|http://archive.ubuntu.com/ubuntu|https://apt.cloud1ful.com/ubuntu|g; s|http://security.ubuntu.com/ubuntu|https://apt.cloud1ful.com/ubuntu|g; s|https://archive.ubuntu.com/ubuntu|https://apt.cloud1ful.com/ubuntu|g; s|https://security.ubuntu.com/ubuntu|https://apt.cloud1ful.com/ubuntu|g' /etc/apt/sources.list.d/ubuntu.sources
          fi
          if [ -f /etc/apt/sources.list ]; then
            sudo sed -i 's|http://archive.ubuntu.com/ubuntu|https://apt.cloud1ful.com/ubuntu|g; s|http://security.ubuntu.com/ubuntu|https://apt.cloud1ful.com/ubuntu|g; s|https://archive.ubuntu.com/ubuntu|https://apt.cloud1ful.com/ubuntu|g; s|https://security.ubuntu.com/ubuntu|https://apt.cloud1ful.com/ubuntu|g' /etc/apt/sources.list
          fi
          sudo apt-get update
          sudo apt-get install -y pkg-config libudev-dev

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Publish changed crates to Kellnr
        env:
          KELLNR_TOKEN: ${{ secrets.KELLNR_TOKEN }}
          CRATESIO_TOKEN: ${{ secrets.CRATESIO_TOKEN }}
        run: |
          if [ -z "$KELLNR_TOKEN" ] && [ -z "$CRATESIO_TOKEN" ]; then
            echo "Missing secrets: KELLNR_TOKEN or CRATESIO_TOKEN"
            exit 1
          fi
          node scripts/ci/publish.mjs publish \
            --crates-json '${{ needs.detect_changes.outputs.publish_crates }}' \
            --kellnr-token "$KELLNR_TOKEN" \
            --crates-io-token "$CRATESIO_TOKEN"
