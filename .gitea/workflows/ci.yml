name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  detect_changes:
    runs-on: rust
    outputs:
      has_test_crates: ${{ steps.detect.outputs.has_test_crates }}
      has_publish_crates: ${{ steps.detect.outputs.has_publish_crates }}
      test_crates: ${{ steps.detect.outputs.test_crates }}
      publish_crates: ${{ steps.detect.outputs.publish_crates }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build crate matrix
        id: detect
        env:
          KELLNR_TOKEN: ${{ secrets.KELLNR_TOKEN }}
        run: |
          node scripts/ci/publish.mjs plan \
            --registry kellnr \
            --kellnr-token "$KELLNR_TOKEN" \
            --github-output "$GITHUB_OUTPUT"

  test:
    needs: detect_changes
    if: ${{ needs.detect_changes.outputs.has_test_crates == 'true' }}
    runs-on: rust
    name: test
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Run changed crate tests
        run: |
          node scripts/ci/publish.mjs test \
            --crates-json '${{ needs.detect_changes.outputs.test_crates }}'

  publish:
    needs: [detect_changes, test]
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.detect_changes.outputs.has_publish_crates == 'true' && (needs.test.result == 'success' || needs.test.result == 'skipped') }}
    runs-on: rust
    name: publish
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Publish changed crates to Kellnr
        env:
          KELLNR_TOKEN: ${{ secrets.KELLNR_TOKEN }}
          CRATES_JSON: ${{ needs.detect_changes.outputs.publish_crates }}
        run: |
          if [ -z "$KELLNR_TOKEN" ]; then
            echo "Missing secret: KELLNR_TOKEN"
            exit 1
          fi
          for crate in $(node -e 'for (const crate of JSON.parse(process.env.CRATES_JSON ?? "[]")) console.log(crate)'); do
            cargo publish --manifest-path "$crate/Cargo.toml" --registry kellnr --token "$KELLNR_TOKEN"
          done
