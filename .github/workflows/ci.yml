name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  detect_changes:
    runs-on: ubuntu-latest
    outputs:
      has_test_crates: ${{ steps.detect.outputs.has_test_crates }}
      test_crates: ${{ steps.detect.outputs.test_crates }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Build crate matrix
        id: detect
        run: |
          node scripts/ci/publish.mjs plan \
            --registry crates-io \
            --github-output "$GITHUB_OUTPUT"

  test:
    needs: detect_changes
    if: ${{ needs.detect_changes.outputs.has_test_crates == 'true' }}
    runs-on: ubuntu-latest
    name: test
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libudev-dev

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Run changed crate tests
        run: |
          node scripts/ci/publish.mjs test \
            --crates-json '${{ needs.detect_changes.outputs.test_crates }}'
