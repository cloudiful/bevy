name: Publish

on:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  detect_changes:
    runs-on: ubuntu-latest
    outputs:
      has_test_crates: ${{ steps.detect.outputs.has_test_crates }}
      has_publish_crates: ${{ steps.detect.outputs.has_publish_crates }}
      test_crates: ${{ steps.detect.outputs.test_crates }}
      publish_crates: ${{ steps.detect.outputs.publish_crates }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Build crate matrix
        id: detect
        run: |
          node scripts/ci/publish.mjs plan \
            --registry crates-io \
            --github-output "$GITHUB_OUTPUT"

  test:
    needs: detect_changes
    if: ${{ needs.detect_changes.outputs.has_test_crates == 'true' }}
    runs-on: ubuntu-latest
    name: test
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libudev-dev

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Run changed crate tests
        run: |
          node scripts/ci/publish.mjs test \
            --crates-json '${{ needs.detect_changes.outputs.test_crates }}'

  publish:
    needs: [detect_changes, test]
    if: ${{ needs.detect_changes.outputs.has_publish_crates == 'true' && (needs.test.result == 'success' || needs.test.result == 'skipped') }}
    runs-on: ubuntu-latest
    name: publish (${{ matrix.crate }})
    permissions:
      contents: read
      id-token: write
    environment:
      name: crates-io
    strategy:
      fail-fast: false
      matrix:
        crate: ${{ fromJson(needs.detect_changes.outputs.publish_crates) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libudev-dev

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Verify package contents
        run: cargo package --manifest-path "${{ matrix.crate }}/Cargo.toml" --allow-dirty

      - name: Authenticate with crates.io
        id: auth
        uses: rust-lang/crates-io-auth-action@v1

      - name: Publish crate to crates.io
        run: cargo publish --manifest-path "${{ matrix.crate }}/Cargo.toml" --token "${{ steps.auth.outputs.token }}"
