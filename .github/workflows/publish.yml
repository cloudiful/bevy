name: Publish

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  detect_changes:
    runs-on: ubuntu-latest
    outputs:
      has_test_crates: ${{ steps.detect.outputs.has_test_crates }}
      has_publish_crates: ${{ steps.detect.outputs.has_publish_crates }}
      test_crates: ${{ steps.detect.outputs.test_crates }}
      publish_crates: ${{ steps.detect.outputs.publish_crates }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Build crate matrix
        id: detect
        env:
          CRATESIO_TOKEN: ${{ secrets.CRATESIO_TOKEN }}
        run: |
          node scripts/ci/publish.mjs plan \
            --registry crates-io \
            --crates-io-token "$CRATESIO_TOKEN" \
            --github-output "$GITHUB_OUTPUT"

  test:
    needs: detect_changes
    if: ${{ needs.detect_changes.outputs.has_test_crates == 'true' }}
    runs-on: ubuntu-latest
    name: test
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Run changed crate tests
        run: |
          node scripts/ci/publish.mjs test \
            --crates-json '${{ needs.detect_changes.outputs.test_crates }}'

  publish:
    needs: [detect_changes, test]
    if: ${{ needs.detect_changes.outputs.has_publish_crates == 'true' && (needs.test.result == 'success' || needs.test.result == 'skipped') }}
    runs-on: ubuntu-latest
    name: publish
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Publish changed crates to crates.io
        env:
          CRATESIO_TOKEN: ${{ secrets.CRATESIO_TOKEN }}
        run: |
          if [ -z "$CRATESIO_TOKEN" ]; then
            echo "Missing secret: CRATESIO_TOKEN"
            exit 1
          fi
          node scripts/ci/publish.mjs publish \
            --registry crates-io \
            --crates-json '${{ needs.detect_changes.outputs.publish_crates }}' \
            --crates-io-token "$CRATESIO_TOKEN"
